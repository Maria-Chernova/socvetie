{% extends 'base.html' %}

{% block title %}{{ bouquet.name }} — {{ shop_name }}{% endblock %}

{% block content %}

<section class="section">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-lg-6 mb-4" data-aos="fade-right">
                <img src="{{ url_for('static', filename='images/' + bouquet.image) }}" alt="{{ bouquet.name }}" class="img-fluid rounded shadow">
            </div>
            <div class="col-lg-6" data-aos="fade-left">
                <h1>{{ bouquet.name }}</h1>
                {% if bouquet.tag %}
                <span class="badge bg-success mb-3">{{ bouquet.tag }}</span>
                {% endif %}
                <p class="lead">{{ bouquet.description }}</p>
                <h3 class="text-primary mb-4">{{ bouquet.price }} ₽</h3>
                <a href="{{ url_for('contact') }}" class="btn btn-primary btn-lg">Заказать этот букет</a>
                <a href="{{ url_for('catalog') }}" class="btn btn-outline-primary btn-lg ms-2">← В каталог</a>
            </div>
        </div>
    </div>
</section>

{% endblock %}
